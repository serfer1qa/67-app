<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>serfus</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0;
            padding: 0;
            min-height: 100vh;
            color: #ffffff;
            /* Тот самый синий градиент */
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #0d1b2a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Сделали стекло чуть более заметным (0.1 вместо 0.03) */
        .glass {
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            border-radius: 24px;
        }

        /* Контейнер входа */
        #loginScreen {
            width: 90%;
            max-width: 350px;
            padding: 40px;
            text-align: center;
        }

        /* Главный контейнер */
        .container { 
            width: 95%;
            max-width: 900px;
            padding: 30px;
            display: none; /* Скрыт до ввода пароля */
            position: relative;
        }

        h1, h2 { 
            font-weight: 200; 
            letter-spacing: 3px;
            margin-bottom: 30px;
        }

        input[type="password"], textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        textarea { height: 300px; resize: none; }

        button {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid white;
            padding: 12px 30px;
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        button:hover { background: white; color: black; }

        /* История */
        .history-btn { position: absolute; top: 30px; right: 30px; cursor: pointer; opacity: 0.7; }
        .history-btn:hover { opacity: 1; }

        /* Модалка */
        #historyModal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="loginScreen" class="glass">
        <h2>serfus</h2>
        <input type="password" id="pass" placeholder="Пароль...">
        <button onclick="check()">Войти</button>
    </div>

    <div id="app" class="container glass">
        <div class="history-btn" onclick="showH()">📜</div>
        <h1>serfus</h1>
        <textarea id="text" placeholder="Пиши тут..."></textarea>
        <br>
        <button onclick="save()">Сохранить</button>
    </div>

    <div id="historyModal" onclick="closeH()">
        <div class="glass" style="padding: 30px; width: 80%; max-width: 500px;" onclick="event.stopPropagation()">
            <h3>История</h3>
            <div id="list" style="max-height: 400px; overflow-y: auto;"></div>
            <br>
            <button onclick="closeH()">Закрыть</button>
        </div>
    </div>

    <script>
        const P = "1234"; // ТВОЙ ПАРОЛЬ

        function check() {
            if(document.getElementById('pass').value === P) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('app').style.display = 'block';
            } else { alert('Неверно'); }
        }

        function save() {
            let t = document.getElementById('text').value;
            if(!t) return;
            let n = JSON.parse(localStorage.getItem('nn') || '[]');
            n.push(t);
            localStorage.setItem('nn', JSON.stringify(n));
            document.getElementById('text').value = '';
            alert('Сохранено!');
        }

        function showH() {
            document.getElementById('historyModal').style.display = 'flex';
            let n = JSON.parse(localStorage.getItem('nn') || '[]');
            document.getElementById('list').innerHTML = n.map(x => `<div style="border-bottom:1px solid rgba(255,255,255,0.1); padding:10px;">${x}</div>`).join('');
        }

        function closeH() { document.getElementById('historyModal').style.display = 'none'; }
    </script>
</body>
</html>
