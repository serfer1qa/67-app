<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>serfus</title>
    <style>
        /* Глубокий градиент */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            color: #ffffff;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #0d1b2a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Эффект стекла */
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            border-radius: 24px;
        }

        /* Главный контейнер на весь экран */
        .container { 
            width: 100%;
            max-width: 900px; /* Сделали еще шире */
            padding: 40px;
            display: none; 
            position: relative;
            box-sizing: border-box;
        }

        /* Экран блокировки */
        #loginScreen {
            width: 100%;
            max-width: 350px;
            padding: 50px 40px;
            text-align: center;
        }

        #loginScreen h2 {
            margin-top: 0;
            font-weight: 300;
            margin-bottom: 30px;
            font-size: 32px;
            letter-spacing: 2px;
        }

        /* Шапка с названием и иконкой */
        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            margin-bottom: 30px;
        }

        h1 { 
            font-size: 36px; 
            font-weight: 200; 
            margin: 0;
            letter-spacing: 3px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Кнопка-иконка истории */
        .history-btn {
            position: absolute;
            right: 0;
            background: transparent;
            border: none;
            padding: 10px;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.7);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }

        .history-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            transform: scale(1.05);
        }

        .history-btn svg {
            width: 28px;
            height: 28px;
            fill: currentColor;
        }

        /* Гигантское поле ввода */
        textarea { 
            width: 100%; 
            background: rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border-radius: 16px; 
            padding: 25px; 
            font-size: 18px; /* Текст еще крупнее */
            font-family: inherit;
            box-sizing: border-box;
            resize: none; /* Отключили ручное растягивание */
            height: 50vh; /* Занимает половину высоты экрана */
            transition: all 0.3s ease;
            line-height: 1.6;
        }

            padding: 15px 20px;
            margin-bottom: 25px;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
        }
